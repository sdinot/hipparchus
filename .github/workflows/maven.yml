name: Java CI with Maven

on: [ push ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 1.8
      uses: actions/setup-java@v1
      with:
        java-version: 1.8
    - name: Build with Maven
      run: mvn -B -f pom.xml install checkstyle:checkstyle
    - name: SonarQube scan
      run: |
        if [ $SONARQUBE_PROJECT_KEY == 'Hipparchus-Math/hipparchus' ] ; then export SONARQUBE_PROJECT_NAME='Hipparchus' ; else export SONARQUBE_PROJECT_NAME="Hipparchus ($SONARQUBE_PROJECT_KEY)" ; fi
        fi
        mvn -B -f pom.xml sonar:sonar -Dsonar.login=$SONARQUBE_TOKEN -Dsonar.branch.name=${GITHUB_REF##*/} -Dsonar.projectKey=$SONARQUBE_PROJECT_KEY -Dsonar.projectName=$SONARQUBE_PROJECT_NAME
      env:
        SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
        SONARQUBE_PROJECT_KEY: ${{ github.repository }}
    - name: Deployment
      if: ( github.repository == 'Hipparchus-Math/hipparchus' ) && ( ( github.ref == 'refs/heads/master' ) || ( github.ref == 'refs/heads/develop' ) )
      run: mvn -B -f pom.xml -s .CI/maven-settings.xml deploy -Pci-deploy -DskipTests=true
      env:
        NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
        NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
